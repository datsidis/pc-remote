<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>PC Remote</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app" id="app" hidden>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark">●</span>
        <h1>PC Remote</h1>
      </div>
      <span class="status-pill" id="status-pill">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Connecting…</span>
      </span>
    </header>

    <section class="touchpad-card">
      <div class="touchpad" id="touchpad">
        <span class="touchpad-label">Touchpad</span>
      </div>
      <div class="click-row">
        <button class="click-btn" id="left-click">Left click</button>
        <button class="click-btn" id="right-click">Right click</button>
      </div>
    </section>

    <section class="media-card">
      <div class="transport-row">
        <button class="transport-btn" id="prev-btn" aria-label="Previous">
          <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zM20 6v12L9 12z"/></svg>
        </button>
        <button class="transport-btn primary" id="play-btn" aria-label="Play / Pause">
          <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pause-icon" viewBox="0 0 24 24" style="display:none"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
        </button>
        <button class="transport-btn" id="next-btn" aria-label="Next">
          <svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM4 6v12l11-6z"/></svg>
        </button>
      </div>

      <div class="volume-row">
        <span class="volume-icon">🔉</span>
        <input type="range" id="volume-slider" min="0" max="100" value="50" />
        <span class="volume-icon">🔊</span>
      </div>
    </section>

    <footer class="footer">
      <span id="device-name-label"></span>
    </footer>
  </div>

  <div class="pair-overlay" id="pair-overlay">
    <div class="pair-card">
      <span class="brand-mark">●</span>
      <h1>PC Remote</h1>
      <p class="pair-hint">Enter the 4-digit PIN shown on your computer</p>
      <input type="tel" inputmode="numeric" pattern="[0-9]*" maxlength="4" id="pin-input" class="pin-input" autofocus />
      <button class="btn-primary" id="pin-submit">Connect</button>
      <p class="pair-error" id="pair-error" hidden>Incorrect PIN. Try again.</p>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
